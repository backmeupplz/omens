services:
  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: omens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omens}
      POSTGRES_DB: omens
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omens"]
      interval: 10s
      timeout: 5s
      retries: 5

  omens:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    expose:
      - '3000'
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://omens:${POSTGRES_PASSWORD:-omens}@postgres:5432/omens
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      omens:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
