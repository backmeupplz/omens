apiVersion: 1

datasources:
  - name: Omens Postgres
    uid: omens-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: grafana_ro
    editable: false
    isDefault: true
    jsonData:
      database: omens
      sslmode: disable
      postgresVersion: 1700
      timescaledb: false
      connMaxLifetime: 14400
      maxIdleConns: 5
      maxOpenConns: 10
    secureJsonData:
      password: $GRAFANA_DB_PASSWORD
